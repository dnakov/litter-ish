name: Release ish-embed artifacts

# Builds the Alpine fakefs that the `ish-embed-host` Rust crate ships
# alongside. Litter consumes the crate as a path/git dep and the rootfs
# as a runtime asset.
#
# Trigger: push a `v*` tag (e.g. `v0.1.0`). Each tag publishes a GitHub
# release with two assets:
#   - fs.tar.gz
#   - SHA256SUMS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.1.0) to attach the release to'
        required: true
        default: 'v0.1.0'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write  # needed to create releases
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Pin Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install build dependencies
        run: brew install meson ninja sqlite jq llvm lld libarchive

      - name: Build fs.tar.gz
        run: ./embed/build-rootfs.sh

      - name: Hash the artifact
        working-directory: build
        run: |
          shasum -a 256 fs.tar.gz > SHA256SUMS
          ls -lh fs.tar.gz SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            build/fs.tar.gz
            build/SHA256SUMS
          generate_release_notes: true
