name: CI

on:
  push:
  pull_request:
      branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        cc: [clang]
    steps:
      - uses: actions/checkout@v6
        with:
            submodules: true
      - uses: actions/setup-python@v6
        with:
            python-version: '3.x'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libarchive-dev
          pip3 install meson ninja
      - name: Build
        run: |
          meson build -Dengine=asbestos -Dkernel=ish
          ninja -C build
        env:
          CC: ${{matrix.cc}}
      - name: Test
        run: ninja -C build test

  build-mac:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
            submodules: true
      - name: Install dependencies
        run: |
          brew install llvm lld ninja libarchive meson
      - name: Build
        run: xcodebuild -project iSH.xcodeproj -scheme iSH -arch arm64 -sdk iphoneos CODE_SIGNING_ALLOWED=NO

  build-embed-rust:
    # Tests the new ish-embed-{protocol,supervisor,host} Cargo workspace.
    # Runs on macOS so the `IshInstance::boot` smoke tests can exercise
    # the kernel against a real fakefs (cross-builds the AArch64 supervisor
    # via rust-lld which ships with rustup).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install host build deps
        run: brew install meson ninja sqlite llvm lld libarchive
      - name: Install AArch64 musl Rust target
        run: rustup target add aarch64-unknown-linux-musl
      - name: Build a dev fakefs
        run: ./embed/build-rootfs.sh
      - name: Protocol unit tests
        working-directory: embed
        run: cargo test -p ish-embed-protocol
      - name: Host build pipeline + lib unit tests
        working-directory: embed
        run: cargo test -p ish-embed-host --lib
      - name: End-to-end smoke
        working-directory: embed
        env:
          ISH_TEST_ROOTFS: ${{ github.workspace }}/build/fs/data
          RUST_BACKTRACE: 1
        run: |
          set +e
          cargo test -p ish-embed-host --test smoke -- --test-threads=1 --nocapture
          status=$?
          if [ "$status" -ne 0 ]; then
            smoke_bin=""
            for candidate in target/debug/deps/smoke-*; do
              if [ -x "$candidate" ] && [ -f "$candidate" ]; then
                smoke_bin="$candidate"
                break
              fi
            done
            if [ -n "$smoke_bin" ]; then
              lldb --batch \
                -o "run --test-threads=1 --nocapture" \
                -o "thread backtrace all" \
                -- "$smoke_bin" || true
            fi
          fi
          exit "$status"
